services:
  db:
    image: postgres:16-alpine
    container_name: panditas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-panditas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-locally}
      POSTGRES_DB: ${POSTGRES_DB:-panditas_wallet}
    ports:
      # Bind to localhost only — the DB is never exposed on the LAN.
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./.docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-panditas} -d ${POSTGRES_DB:-panditas_wallet}"]
      interval: 10s
      timeout: 5s
      retries: 5
